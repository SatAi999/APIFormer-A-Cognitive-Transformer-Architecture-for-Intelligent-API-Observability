apiVersion: apps/v1
kind: Deployment
metadata:
  name: apiformer-api-deployment
  labels:
    app: apiformer-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: apiformer-api
  template:
    metadata:
      labels:
        app: apiformer-api
    spec:
      containers:
      - name: api-service
        image: apiformer-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "1.0"
            memory: "1Gi"
          requests:
            cpu: "0.5"
            memory: "512Mi"
        env:
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: apiformer-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
